name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: SemVer version to release, for example 0.2.0
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, tag, and publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    env:
      VERSION: ${{ inputs.version }}
      TAG: v${{ inputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release request
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF_NAME" != "main" ]]; then
            echo "Releases must be run from main; current ref is $GITHUB_REF_NAME" >&2
            exit 64
          fi

          python scripts/bump_version.py "$VERSION" --check-changelog --dry-run

          if git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists" >&2
            exit 64
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" build mkdocs mkdocs-material pyyaml twine

      - name: Bump version files
        run: python scripts/bump_version.py "$VERSION" --check-changelog --notes-output /tmp/release-notes.md

      - name: Verify package version
        shell: bash
        run: |
          set -euo pipefail
          python -m ca9.cli --version | tee /tmp/ca9-version.txt
          grep "$VERSION" /tmp/ca9-version.txt

      - name: Run tests
        run: pytest -q

      - name: Run lint and format checks
        run: |
          ruff check src tests scripts
          ruff format --check src tests scripts

      - name: Build docs
        run: python -m mkdocs build --strict -d /tmp/ca9-mkdocs-site

      - name: Build package
        run: |
          python -m build
          python -m twine check dist/*

      - name: Commit version bump and create tag
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add pyproject.toml src/ca9/__init__.py CHANGELOG.md
          if [[ -f docs/assets/structured-data.js ]]; then
            git add docs/assets/structured-data.js
          fi
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): $TAG"
          else
            echo "Version files already match $VERSION; tagging current commit."
          fi

          git tag -a "$TAG" -m "ca9 $TAG"
          git push origin "HEAD:$GITHUB_REF_NAME"
          git push origin "$TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$TAG" dist/* --title "ca9 $TAG" --notes-file /tmp/release-notes.md --verify-tag

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
