name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Existing release tag to rebuild/publish, for example v0.3.2. Leave empty to run Release Please."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    if: ${{ github.ref_name == 'main' && (github.event_name != 'workflow_dispatch' || inputs.ref == '') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN != '' && secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: tools/release/release-please-config.json
          manifest-file: tools/release/.release-please-manifest.json

  publish-release:
    name: Build and publish
    needs: release-please
    if: ${{ always() && ((github.event_name == 'workflow_dispatch' && inputs.ref != '') || needs.release-please.outputs.release_created == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: pypi
      url: https://pypi.org/project/ca9/
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || needs.release-please.outputs.tag_name }}

    steps:
      - name: Resolve release tag
        id: release_ref
        shell: bash
        run: |
          set -euo pipefail
          ref="${RELEASE_REF}"
          case "$ref" in
            refs/tags/v[0-9]*)
              tag="${ref#refs/tags/}"
              ;;
            v[0-9]*)
              tag="$ref"
              ;;
            *)
              echo "Expected a release tag like v0.3.2, got: $ref" >&2
              exit 1
              ;;
          esac
          semver_re='^v(0|[1-9][0-9]*)[.](0|[1-9][0-9]*)[.](0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*)([.](0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*))*))?([+]([0-9A-Za-z-]+([.][0-9A-Za-z-]+)*))?$'
          if [[ ! "$tag" =~ $semver_re ]]; then
            echo "Expected a semantic release tag like v0.3.2, got: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ steps.release_ref.outputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify release provenance
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          git fetch --force origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"

          tag_commit="$(git rev-list -n 1 "refs/tags/${RELEASE_TAG}")"
          checkout_commit="$(git rev-parse HEAD)"
          if [[ "$tag_commit" != "$checkout_commit" ]]; then
            echo "Checked-out commit does not match ${RELEASE_TAG}" >&2
            exit 1
          fi

          if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "${RELEASE_TAG} does not point to a commit reachable from origin/main" >&2
            exit 1
          fi

          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null

          version="${RELEASE_TAG#v}"
          python - "$version" <<'PY'
          import json
          import pathlib
          import re
          import sys
          import tomllib

          expected = sys.argv[1]
          root = pathlib.Path(".")

          pyproject = tomllib.loads((root / "pyproject.toml").read_text(encoding="utf-8"))
          actual = pyproject["project"]["version"]
          if actual != expected:
              raise SystemExit(f"pyproject version {actual!r} does not match release tag {expected!r}")

          init_text = (root / "src" / "ca9" / "__init__.py").read_text(encoding="utf-8")
          init_match = re.search(r'^__version__ = "([^"]+)"', init_text, re.MULTILINE)
          init_version = init_match.group(1) if init_match else None
          if init_version != expected:
              raise SystemExit(
                  f"src/ca9/__init__.py version {init_version!r} does not match release tag {expected!r}"
              )

          manifest = json.loads(
              (root / "tools" / "release" / ".release-please-manifest.json").read_text(
                  encoding="utf-8"
              )
          )
          manifest_version = manifest.get(".")
          if manifest_version != expected:
              raise SystemExit(
                  f"release-please manifest version {manifest_version!r} does not match release tag {expected!r}"
              )

          structured_text = (root / "docs" / "assets" / "structured-data.js").read_text(
              encoding="utf-8"
          )
          structured_match = re.search(r'"softwareVersion": "([^"]+)"', structured_text)
          structured_version = structured_match.group(1) if structured_match else None
          if structured_version != expected:
              raise SystemExit(
                  f"docs structured-data softwareVersion {structured_version!r} does not match release tag {expected!r}"
              )
          PY

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" build mkdocs mkdocs-material pyyaml twine

      - name: Verify package version
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          python -m ca9.cli --version | tee /tmp/ca9-version.txt
          grep "$version" /tmp/ca9-version.txt

      - name: Run tests
        run: pytest -q

      - name: Run lint and format checks
        run: |
          ruff check src tests scripts
          ruff format --check src tests scripts

      - name: Build docs
        run: python -m mkdocs build --strict -d /tmp/ca9-mkdocs-site

      - name: Build package
        run: |
          python -m build
          python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist-${{ env.RELEASE_TAG }}
          path: dist
          if-no-files-found: error

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
