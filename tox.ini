[tox]
requires = tox>=4
env_list = py{310,311,312,313}, lint, skylos

[testenv]
deps =
    pytest>=7.0
    click>=8.0
commands =
    pytest {posargs:tests/ -v}
set_env =
    PYTHONPATH = src

[testenv:lint]
skip_install = true
deps =
    ruff>=0.4
commands =
    ruff check src/ tests/
    ruff format --check src/ tests/

[testenv:format]
skip_install = true
deps =
    ruff>=0.4
commands =
    ruff check --fix src/ tests/
    ruff format src/ tests/

[testenv:skylos]
skip_install = true
deps =
    skylos>=3.5.2
commands =
    skylos src/ --json
